<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login · simple form</title>
  <style>
    /* global reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #f6f9fc 0%, #e9f1f8 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1rem;
    }

    /* card / form container */
    .login-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      background-color: #ffffff;
      width: 100%;
      max-width: 400px;
      padding: 2.2rem 2rem 2.5rem;
      border-radius: 32px;
      box-shadow: 
        0 20px 35px -8px rgba(0, 20, 30, 0.15),
        0 8px 18px -6px rgba(0, 40, 60, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.5);
      transition: box-shadow 0.2s ease;
    }

    .login-card:hover {
      box-shadow: 0 25px 40px -12px rgba(0, 50, 70, 0.2);
    }

    /* title */
    .login-title {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #1a2e3f;
      margin-bottom: 1.8rem;
      text-align: center;
      line-height: 1.2;
      border-bottom: 2px solid #dceaf2;
      padding-bottom: 0.75rem;
    }

    /* input groups */
    .input-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      color: #2c4c6b;
      margin-bottom: 0.4rem;
      margin-left: 0.2rem;
    }

    input {
      width: 100%;
      padding: 0.9rem 1.2rem;
      font-size: 1rem;
      background-color: #f2f7fd;
      border: 2px solid transparent;
      border-radius: 30px;
      outline: none;
      transition: all 0.2s ease;
      color: #1f3c54;
      box-shadow: inset 0 2px 4px rgba(0, 20, 30, 0.02);
    }

    input:focus {
      background-color: #ffffff;
      border-color: #7fb7d9;
      box-shadow: 0 0 0 4px rgba(127, 183, 217, 0.2);
    }

    input::placeholder {
      color: #9bb4cc;
      font-weight: 300;
      font-size: 0.95rem;
    }

    /* forgot password row */
    .forgot-row {
      text-align: right;
      margin-top: -0.8rem;
      margin-bottom: 1.8rem;
    }

    .forgot-link {
      color: #3f6b8f;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .forgot-link:hover {
      color: #1d3f5c;
      border-bottom: 1px solid #7fb7d9;
    }

    /* login button */
    .login-btn {
      width: 100%;
      background: #267c9e;
      border: none;
      padding: 0.9rem 1.5rem;
      border-radius: 40px;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 8px 18px -6px rgba(28, 88, 120, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin-bottom: 1.5rem;
    }

    .login-btn:hover {
      background: #1b6280;
      transform: scale(1.01);
      box-shadow: 0 12px 22px -8px rgba(18, 75, 100, 0.5);
    }

    .login-btn:active {
      transform: scale(0.99);
      background: #144f68;
    }

    /* create account link */
    .create-link {
      text-align: center;
      margin-top: 0.2rem;
    }

    .create-account {
      color: #2e577a;
      font-size: 1rem;
      font-weight: 500;
      text-decoration: none;
      border-bottom: 2px dotted #b7d3e8;
      transition: color 0.2s, border-bottom 0.2s;
    }

    .create-account:hover {
      color: #113247;
      border-bottom: 2px solid #267c9e;
    }

    /* small responsive adjustments */
    @media (max-width: 450px) {
      .login-card {
        padding: 1.8rem 1.5rem 2.2rem;
        border-radius: 28px;
      }
      .login-title {
        font-size: 1.8rem;
        margin-bottom: 1.5rem;
      }
      input {
        padding: 0.8rem 1.2rem;
      }
    }

    /* very small screens */
    @media (max-width: 360px) {
      .login-card {
        padding: 1.5rem 1.2rem 2rem;
      }
      .login-title {
        font-size: 1.6rem;
      }
    }

    /* optional: make the links slightly more tappable */
    a {
      -webkit-tap-highlight-color: transparent;
    }

    /* style for required fields (browser default will show validation) */
    input:invalid:not(:placeholder-shown) {
      border-color: #e0a7a7;
    }
    /* we keep it subtle, but not intrusive */
  </style>
</head>
<body>
  <div class="login-card">
    <!-- simple title at the top -->
    <h1 class="login-title">User Login</h1>

    <!-- form with built-in HTML5 validation (required fields) -->
    <form action="#" method="post" novalidate>
      <!-- username / email field -->
      <div class="input-group">
        <label for="username">Username or Email</label>
        <input type="text" id="username" name="username" 
               placeholder="e.g. alex@example.com / alex123" 
               required 
               autocomplete="username">
        <!-- required attribute ensures non-empty validation -->
      </div>

      <!-- password field -->
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" 
               placeholder="••••••••" 
               required 
               autocomplete="current-password">
      </div>

      <!-- forgot password link (exact text) -->
      <div class="forgot-row">
        <a href="#" class="forgot-link">Forgot Password?</a>
      </div>

      <!-- login button with hover effect -->
      <button type="submit" class="login-btn">Log in</button>

      <!-- create account link (exact text) -->
      <div class="create-link">
        <a href="#" class="create-account">Create Account</a>
      </div>

      <!-- subtle note: both fields are required (browser shows message if empty) -->
    </form>

    <!-- extra simple line to indicate required fields (purely visual) -->
    <p style="font-size: 0.75rem; color: #8ba5bc; text-align: center; margin-top: 1rem; opacity: 0.7;">
      Username and password are required
    </p>
  </div>
</body>
</html>
