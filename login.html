<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login · modern form</title>
  <!-- external CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-card">
    <h1 class="login-title">User Login</h1>

    <!-- Login form with JavaScript validation -->
    <form id="loginForm" action="#" method="post" novalidate>
      <!-- Username / Email field -->
      <div class="input-group">
        <label for="username">Username or Email</label>
        <input type="text" id="username" name="username" 
               placeholder="e.g. alex@example.com / alex123"
               autocomplete="username">
        <div class="error-message" id="usernameError"></div>
      </div>

      <!-- Password field -->
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" 
               placeholder="••••••••"
               autocomplete="current-password">
        <div class="error-message" id="passwordError"></div>
      </div>

      <!-- Forgot password link -->
      <div class="forgot-row">
        <a href="#" class="forgot-link">Forgot Password?</a>
      </div>

      <!-- Login button -->
      <button type="submit" class="login-btn">Log in</button>

      <!-- Create account link -->
      <div class="create-link">
        <a href="#" class="create-account">Create Account</a>
      </div>
    </form>

    <!-- Success message placeholder (hidden until login success) -->
    <div class="success-message" id="successMessage">✅ Login Successful</div>
  </div>

  <!-- external JavaScript -->
  <script src="script.js"></script>
</body>
</html>
